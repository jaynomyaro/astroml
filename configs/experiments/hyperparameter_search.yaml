# Hyperparameter search experiment configuration
defaults:
  - /model: gcn
  - /training: default
  - /data: cora
  - _self_

# Hyperparameter search settings
experiment:
  name: "hyperparameter_search"
  seed: 42

# Model parameter grid
model:
  hidden_dims:
    - [32]
    - [64, 32]
    - [128, 64]
  dropout:
    - 0.2
    - 0.5
    - 0.7

# Training parameter grid
training:
  lr:
    - 0.001
    - 0.01
    - 0.1
  weight_decay:
    - 1e-5
    - 5e-4
    - 1e-3

# Data settings
data:
  name: "Cora"
