apiVersion: v1
kind: ServiceAccount
metadata:
  name: astroml
  namespace: astroml
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: astroml
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: astroml
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: astroml
subjects:
- kind: ServiceAccount
  name: astroml
  namespace: astroml
